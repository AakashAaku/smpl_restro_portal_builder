[build]
  command = "prisma generate && prisma db push --accept-data-loss && prisma db seed && npm run build:client"
  functions = "netlify/functions"
  publish = "dist/spa"

[build.environment]
  DATABASE_URL = "postgres://neondb_owner:npg_U7dh6JuHAkyq@ep-lively-thunder-ankua0j1-pooler.c-6.us-east-1.aws.neon.tech/neondb"
  JWT_SECRET = "your-secret-key-123"

[functions]
  node_bundler = "esbuild"
  included_files = ["server/generated/client/**"]

[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/:splat"

# Catch-all for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
